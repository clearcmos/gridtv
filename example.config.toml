[log]
# Verbosity of log output, written to both the console and the userData log
# file (its path is printed to the console on startup; see README.md).
# One of: error, warn, info, verbose, debug, silly.
#level = "debug"

[window]
# Window dimensions
#width = 1920
#height = 1080

# Position a frameless window (useful for capturing w/ fixed screen positions)
#x = 0
#y = 0
#frameless = false

# Open the wall on a specific monitor. `display` is a 0-based index into the
# displays your OS reports (0 = primary). When set, it overrides x/y: a windowed
# wall is centered on that display, a fullscreen wall fills it. An out-of-range
# index is ignored (with a warning) and falls back to the default placement.
#display = 1

# Open the wall fullscreen (combine with `display` to pick which monitor).
#fullscreen = false

# Set the background color (useful for chroma-keying)
#background-color = "#0f0"

# Set the active (highlight) color
#active-color = "#fff"

[grid]
# First-run tile count is cols × rows, clamped to 1-9. After the first launch,
# the exact count selected from the wall's F1 menu is persisted separately.
#cols = 3
#rows = 3

[control]
# WebSocket URL (including the auth token) for the separate control server
# that operators use to remotely arrange the grid. The control server prints
# this URL to stdout on startup — copy it here verbatim.
#endpoint = "ws://localhost/streamwall/<id>/ws?token=<secret>"

[data]
# Interval to refresh polled datasources
#interval = 30

# You can add URLs to fetch here:
json-url = []

# You can also specify .toml files on disk. Streamwall will reload the data whenever the file changes.
# See example.streams.toml for a sample.
#toml-file = ["./example.streams.toml"]

[retry]
# Automatically reload views that fail to load or stall. Failed views show an
# error badge with the reason on the wall and in the control UI while retrying.
#enabled = true

# Base backoff (in seconds) before the first reload. The delay doubles after each
# failed attempt (exponential backoff), capped at max-delay.
#delay = 5
#max-delay = 60

# Give up after this many automatic reloads (a manual reload resets the count).
#max-retries = 5

# How long (in seconds) a playing view may stall before it is reloaded.
#stalled-timeout = 30

[media]
# "shared" reuses one persistent browser cache and login across every stream
# view (recommended for Twitch walls). Use "isolated" for a fresh, ephemeral
# session per tile at the cost of duplicate site assets and no shared login.
#session-mode = "shared"

# Rewrite normal twitch.tv/channel URLs to Twitch's official lightweight player
# instead of loading the full site (navigation/chat/discovery) in every tile.
#twitch-player = true

# Fixed Twitch rendition for a dense wall. Use "160p" for very small tiles,
# "360p" (default), "480p", "720p", or "auto" for Twitch's own ABR choice.
#twitch-quality = "360p"

# Keep one small WebP poster per stream for seamless stalls/swaps. Set the
# interval to 0 to disable snapshots entirely. Snapshots are scaled to the
# smaller of the visible tile width and snapshot-max-width.
#snapshot-interval = 10
#snapshot-max-width = 640
#snapshot-quality = 0.65

[twitch]
#channel = "woke"
#username = "bot-username"
#color = "#ff0000"

# Use https://twitchtokengenerator.com/?scope=chat:read+chat:edit to generate an OAuth token:
#token = "twitch-oauth-token"

    [twitch.announce]
    #template = "SingsMic <%- stream.source %> <%- stream.city && stream.state ? `(${stream.city} ${stream.state})` : '' %> <%- stream.link %>"
    #interval = 60
    #delay = 30

    [twitch.vote]
    #template = "Switching to #<%- selectedIdx %> (with <%- voteCount %> votes)"
    #interval = 15

# Streamwall and streamwall-control-server speak plain HTTP/WebSocket only —
# neither terminates TLS itself. For a remote `wss://` control endpoint, put a
# reverse proxy (e.g. nginx, Caddy) in front to handle certificates and
# forward to the plain-http server. See docs/self-hosting.md for a ready-made
# Docker + Caddy setup.

[streamdelay]
#endpoint = "http://localhost:8404"
#key = "super-secret"

[telemetry]
# Whether to report uncaught errors to Streamwall's Sentry project. Enabled
# by default; uncomment to opt out.
#sentry = false

# Cycle a grid cell through a fixed list of stream URLs on an interval,
# independent of manual placement or any data source. Add one [[playlist]]
# table per cell you want to cycle; cells without one behave as usual.
#[[playlist]]
#view = 0
#interval = 60
#urls = ["https://example.com/stream-a", "https://example.com/stream-b"]
