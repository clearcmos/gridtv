[window]
# Window dimensions
#width = 1920
#height = 1080

# Position a frameless window (useful for capturing w/ fixed screen positions)
#x = 0
#y = 0
#frameless = false

# Set the background color (useful for chroma-keying)
#background-color = "#0f0"

# Set the active (highlight) color
#active-color = "#fff"

[grid]
# Number of columns and rows in the stream grid (default: 3x3, each 1-8)
#cols = 3
#rows = 3

[control]
# WebSocket URL (including the auth token) for the separate control server
# that operators use to remotely arrange the grid. The control server prints
# this URL to stdout on startup — copy it here verbatim.
#endpoint = "ws://localhost/streamwall/<id>/ws?token=<secret>"

[data]
# Interval to refresh polled datasources
#interval = 30

# You can add URLs to fetch here:
json-url = []

# You can also specify .toml files on disk. Streamwall will reload the data whenever the file changes.
# See example.streams.toml for a sample.
#toml-file = ["./example.streams.toml"]

[retry]
# Automatically reload views that fail to load or stall. Failed views show an
# error badge with the reason on the wall and in the control UI while retrying.
#enabled = true

# Base backoff (in seconds) before the first reload. The delay doubles after each
# failed attempt (exponential backoff), capped at max-delay.
#delay = 5
#max-delay = 60

# Give up after this many automatic reloads (a manual reload resets the count).
#max-retries = 5

# How long (in seconds) a playing view may stall before it is reloaded.
#stalled-timeout = 30

[twitch]
#channel = "woke"
#username = "bot-username"
#color = "#ff0000"

# Use https://twitchtokengenerator.com/?scope=chat:read+chat:edit to generate an OAuth token:
#token = "twitch-oauth-token"

    [twitch.announce]
    #template = "SingsMic <%- stream.source %> <%- stream.city && stream.state ? `(${stream.city} ${stream.state})` : '' %> <%- stream.link %>"
    #interval = 60
    #delay = 30

    [twitch.vote]
    #template = "Switching to #<%- selectedIdx %> (with <%- voteCount %> votes)"
    #interval = 15

# Streamwall and streamwall-control-server speak plain HTTP/WebSocket only —
# neither terminates TLS itself. For a remote `wss://` control endpoint, put a
# reverse proxy (e.g. nginx, Caddy) in front to handle certificates and
# forward to the plain-http server.

[streamdelay]
#endpoint = "http://localhost:8404"
#key = "super-secret"

[telemetry]
# Whether to report uncaught errors to Streamwall's Sentry project. Enabled
# by default; uncomment to opt out.
#sentry = false

# Cycle a grid cell through a fixed list of stream URLs on an interval,
# independent of manual placement or any data source. Add one [[playlist]]
# table per cell you want to cycle; cells without one behave as usual.
#[[playlist]]
#view = 0
#interval = 60
#urls = ["https://example.com/stream-a", "https://example.com/stream-b"]
