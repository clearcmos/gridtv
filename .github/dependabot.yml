version: 2
updates:
  # npm dependencies across the workspace (single root lockfile).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      production-dependencies:
        dependency-type: production
      development-dependencies:
        dependency-type: development

  # Keep GitHub Actions pinned-SHAs current (paired with SHA pinning in workflows).
  # The extra directory covers the local composite action in .github/actions.
  - package-ecosystem: github-actions
    directories:
      - /
      - /.github/actions/setup
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    # Bundle all action updates into one PR so multi-step actions (e.g. CodeQL
    # init + analyze) always move together and never mismatch versions.
    groups:
      github-actions:
        patterns:
          - '*'
