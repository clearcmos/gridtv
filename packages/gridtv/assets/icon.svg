<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 512 512"
  role="img"
  aria-labelledby="title description"
>
  <title id="title">gridtv app icon</title>
  <desc id="description">
    A violet three by three video wall with a red live tile on a dark screen.
  </desc>
  <defs>
    <linearGradient id="frame" x1="80" y1="64" x2="432" y2="448">
      <stop offset="0" stop-color="#272338" />
      <stop offset="1" stop-color="#100e18" />
    </linearGradient>
    <linearGradient id="violet" x1="104" y1="104" x2="408" y2="408">
      <stop offset="0" stop-color="#c4a0ff" />
      <stop offset="0.48" stop-color="#9147ff" />
      <stop offset="1" stop-color="#6d28d9" />
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="472" height="472" rx="116" fill="#09080e" />
  <rect
    x="34"
    y="34"
    width="444"
    height="444"
    rx="102"
    fill="url(#frame)"
    stroke="#4a3d66"
    stroke-width="8"
  />

  <g fill="url(#violet)">
    <rect x="96" y="96" width="92" height="92" rx="22" />
    <rect x="210" y="96" width="92" height="92" rx="22" />
    <rect x="324" y="96" width="92" height="92" rx="22" />
    <rect x="96" y="210" width="92" height="92" rx="22" />
    <rect x="324" y="210" width="92" height="92" rx="22" />
    <rect x="96" y="324" width="92" height="92" rx="22" />
    <rect x="210" y="324" width="92" height="92" rx="22" />
    <rect x="324" y="324" width="92" height="92" rx="22" />
  </g>

  <rect x="210" y="210" width="92" height="92" rx="22" fill="#ef4444" />
  <circle cx="256" cy="256" r="18" fill="#fff7f7" />
</svg>
